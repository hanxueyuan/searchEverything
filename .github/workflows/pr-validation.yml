name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # PR 基础检查
  # ============================================
  pr-checks:
    name: PR Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  # ============================================
  # 检查 PR 描述
  # ============================================
  pr-description:
    name: Check PR Description
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            
            // 检查 PR 标题
            if (!pr.title || pr.title.length < 10) {
              core.setFailed('PR title is too short. Please provide a descriptive title.');
            }
            
            // 检查 PR 描述
            if (!pr.body || pr.body.length < 20) {
              core.setFailed('PR description is too short. Please describe your changes.');
            }
            
            // 检查是否包含测试说明
            const hasTestInfo = pr.body.toLowerCase().includes('test') || 
                               pr.body.toLowerCase().includes('测试');
            if (!hasTestInfo) {
              console.log('⚠️ Consider adding test information to the PR description.');
            }
            
            console.log('✅ PR description looks good!');

  # ============================================
  # 检查变更文件
  # ============================================
  changed-files:
    name: Check Changed Files
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.changes.outputs.src }}
      docs_changed: ${{ steps.changes.outputs.docs }}
      cargo_changed: ${{ steps.changes.outputs.cargo }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get changed files
        id: changes
        uses: tj-actions/changed-files@v45
        with:
          files_yaml: |
            src:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            docs:
              - 'docs/**'
              - '*.md'
              - 'README.md'
            cargo:
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ============================================
  # 依赖安全检查 (当 Cargo.toml 变更时)
  # ============================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changed-files
    if: needs.changed-files.outputs.cargo_changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # ============================================
  # 文档构建检查 (当文档变更时)
  # ============================================
  docs-build:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: changed-files
    if: needs.changed-files.outputs.docs_changed == 'true' || needs.changed-files.outputs.src_changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --all-features --no-deps

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc
          retention-days: 7
