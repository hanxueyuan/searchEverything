name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: searchEverything
  BINARY_NAME: searchEverything

permissions:
  contents: write
  packages: write

jobs:
  # ============================================
  # 创建 GitHub Release
  # ============================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ steps.get_version.outputs.version }}

  # ============================================
  # 构建 Linux 版本
  # ============================================
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: searchEverything-x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
            artifact_name: searchEverything-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-gnu
            artifact_name: searchEverything-aarch64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          target: ${{ matrix.target }}

      - name: Install musl-tools (for musl target)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --all-features

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/searchEverything

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.artifact_name }}.tar.gz searchEverything
          sha256sum searchEverything > ../../../${{ matrix.artifact_name }}.sha256

      - name: Upload release asset (tar.gz)
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}.tar.gz

      - name: Upload release asset (sha256)
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}.sha256

  # ============================================
  # 构建 Windows 版本
  # ============================================
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact_name: searchEverything-x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --all-features

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path searchEverything.exe -DestinationPath ../../../${{ matrix.artifact_name }}.zip
          certutil -hashfile searchEverything.exe SHA256 | findstr /i sha256 > ../../../${{ matrix.artifact_name }}.sha256

      - name: Upload release asset (zip)
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}.zip

      - name: Upload release asset (sha256)
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}.sha256

  # ============================================
  # 构建 macOS 版本
  # ============================================
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact_name: searchEverything-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            artifact_name: searchEverything-aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --all-features

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/searchEverything

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.artifact_name }}.tar.gz searchEverything
          shasum -a 256 searchEverything > ../../../${{ matrix.artifact_name }}.sha256

      - name: Upload release asset (tar.gz)
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}.tar.gz

      - name: Upload release asset (sha256)
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}.sha256

  # ============================================
  # 发布到 crates.io (可选)
  # ============================================
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
        continue-on-error: true

  # ============================================
  # 通知发布完成
  # ============================================
  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, build-linux, build-windows, build-macos]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-linux.result }}" == "success" ] && \
             [ "${{ needs.build-windows.result }}" == "success" ] && \
             [ "${{ needs.build-macos.result }}" == "success" ]; then
            echo "✅ Release completed successfully!"
            echo "📦 All binaries are available at: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.version }}"
          else
            echo "⚠️ Some builds failed. Check the workflow logs for details."
            exit 1
          fi
