name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: searchEverything

jobs:
  # ============================================================================
  # Linux x86_64 构建
  # ============================================================================
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare binary
        run: |
          mkdir -p release
          cp target/x86_64-unknown-linux-gnu/release/${{ env.PROJECT_NAME }} release/
          mv release/${{ env.PROJECT_NAME }} release/${{ env.PROJECT_NAME }}-x86_64-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: release/${{ env.PROJECT_NAME }}-x86_64-linux-gnu

  # ============================================================================
  # Linux aarch64 构建
  # ============================================================================
  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Prepare binary
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/${{ env.PROJECT_NAME }} release/
          mv release/${{ env.PROJECT_NAME }} release/${{ env.PROJECT_NAME }}-aarch64-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: release/${{ env.PROJECT_NAME }}-aarch64-linux-gnu

  # ============================================================================
  # macOS x86_64 构建
  # ============================================================================
  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: x86_64-apple-darwin

      - name: Build release
        run: cargo build --release --target x86_64-apple-darwin

      - name: Prepare binary
        run: |
          mkdir -p release
          cp target/x86_64-apple-darwin/release/${{ env.PROJECT_NAME }} release/
          mv release/${{ env.PROJECT_NAME }} release/${{ env.PROJECT_NAME }}-x86_64-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: release/${{ env.PROJECT_NAME }}-x86_64-macos

  # ============================================================================
  # macOS aarch64 (Apple Silicon) 构建
  # ============================================================================
  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: aarch64-apple-darwin

      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin

      - name: Prepare binary
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/${{ env.PROJECT_NAME }} release/
          mv release/${{ env.PROJECT_NAME }} release/${{ env.PROJECT_NAME }}-aarch64-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: release/${{ env.PROJECT_NAME }}-aarch64-macos

  # ============================================================================
  # Windows x86_64 构建
  # ============================================================================
  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare binary
        run: |
          mkdir release
          Copy-Item target/x86_64-pc-windows-msvc/release/${{ env.PROJECT_NAME }}.exe release/
          Move-Item release/${{ env.PROJECT_NAME }}.exe release/${{ env.PROJECT_NAME }}-x86_64-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: release/${{ env.PROJECT_NAME }}-x86_64-windows.exe

  # ============================================================================
  # Windows aarch64 构建
  # ============================================================================
  build-windows-aarch64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: aarch64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target aarch64-pc-windows-msvc

      - name: Prepare binary
        run: |
          mkdir release
          Copy-Item target/aarch64-pc-windows-msvc/release/${{ env.PROJECT_NAME }}.exe release/
          Move-Item release/${{ env.PROJECT_NAME }}.exe release/${{ env.PROJECT_NAME }}-aarch64-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-aarch64
          path: release/${{ env.PROJECT_NAME }}-aarch64-windows.exe

  # ============================================================================
  # 创建 GitHub Release
  # ============================================================================
  create-release:
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos-x86_64, build-macos-aarch64, build-windows-x86_64, build-windows-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/linux-x86_64/* release-assets/
          cp artifacts/linux-aarch64/* release-assets/
          cp artifacts/macos-x86_64/* release-assets/
          cp artifacts/macos-aarch64/* release-assets/
          cp artifacts/windows-x86_64/* release-assets/
          cp artifacts/windows-aarch64/* release-assets/
          
          # 列出所有文件
          ls -la release-assets/

      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: Release ${{ steps.tag.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/searchEverything-x86_64-linux-gnu
            release-assets/searchEverything-aarch64-linux-gnu
            release-assets/searchEverything-x86_64-macos
            release-assets/searchEverything-aarch64-macos
            release-assets/searchEverything-x86_64-windows.exe
            release-assets/searchEverything-aarch64-windows.exe
