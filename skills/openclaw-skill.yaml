name: searchEverything
description: |
  本地文件搜索和管理 CLI 工具（纯命令行，无 GUI）。
  使用场景：搜索文件、查看文件信息、读取文件内容、文件操作（复制/移动/删除）。
  命令：se search, se info, se cat, se copy, se move, se delete, se index
  安装位置：/usr/local/bin/se 或 ~/.cargo/bin/se
  
commands:
  - name: search
    description: 搜索文件（支持通配符 * 和 ?）
    trigger_patterns:
      - "搜索.*文件"
      - "查找.*"
      - "有没有.*"
      - "找.*文件"
      - ".*在哪里"
      - ".*在哪个目录"
    template: "se search '{pattern}' --path {path} --limit {limit} --format json"
    parameters:
      - name: pattern
        type: string
        required: true
        description: 搜索模式，支持通配符（如 *.pdf, report*.docx）
        examples:
          - "*.pdf"
          - "report*"
          - "*.rs"
      - name: path
        type: string
        required: false
        default: "."
        description: 搜索路径，默认当前目录
        examples:
          - "D:/work"
          - "/home/user/documents"
          - "."
      - name: limit
        type: number
        required: false
        default: 100
        description: 最大返回结果数
        examples:
          - 10
          - 50
          - 100

  - name: info
    description: 查看文件详细信息（大小、修改时间、权限等）
    trigger_patterns:
      - "文件信息"
      - "查看.*信息"
      - "这个文件.*"
      - ".*多大"
      - ".*什么时候修改"
    template: "se info {file_path}{json_flag}"
    parameters:
      - name: file_path
        type: string
        required: true
        description: 文件路径
        examples:
          - "D:/work/report.pdf"
          - "/home/user/test.rs"
      - name: json_flag
        type: string
        required: false
        default: ""
        description: 是否 JSON 输出（--json）
        examples:
          - ""
          - " --json"

  - name: cat
    description: 读取文件内容（支持文本文件预览）
    trigger_patterns:
      - "打开.*"
      - "读取.*"
      - "查看内容"
      - "显示.*内容"
      - ".*里面是什么"
    template: "se cat {file_path}{lines_flag}{tail_flag}"
    parameters:
      - name: file_path
        type: string
        required: true
        description: 文件路径
        examples:
          - "README.md"
          - "D:/work/notes.txt"
      - name: lines_flag
        type: string
        required: false
        default: ""
        description: 显示行数（--lines N）
        examples:
          - ""
          - " --lines 10"
          - " --lines 50"
      - name: tail_flag
        type: boolean
        required: false
        default: false
        description: 显示末尾 N 行（--tail）
        examples:
          - false
          - true

  - name: copy
    description: 复制文件或目录
    trigger_patterns:
      - "复制.*"
      - "拷贝.*"
      - "把这个.*到.*"
    template: "se copy {source} {dest}"
    parameters:
      - name: source
        type: string
        required: true
        description: 源文件路径（支持通配符）
        examples:
          - "D:/work/report.pdf"
          - "*.txt"
      - name: dest
        type: string
        required: true
        description: 目标路径
        examples:
          - "D:/backup/"
          - "/home/user/documents/"

  - name: move
    description: 移动文件或目录
    trigger_patterns:
      - "移动.*"
      - "剪切.*"
      - "把这个.*移到.*"
    template: "se move {source} {dest}"
    parameters:
      - name: source
        type: string
        required: true
        description: 源文件路径
        examples:
          - "D:/work/old/report.pdf"
          - "temp.txt"
      - name: dest
        type: string
        required: true
        description: 目标路径
        examples:
          - "D:/work/new/"
          - "/home/user/archive/"

  - name: delete
    description: 删除文件或目录
    trigger_patterns:
      - "删除.*"
      - "移除.*"
      - "不要.*了"
      - "清理.*"
    template: "se delete {path}{force_flag}"
    parameters:
      - name: path
        type: string
        required: true
        description: 文件路径（支持通配符）
        examples:
          - "D:/temp/*.tmp"
          - "old_backup.zip"
      - name: force_flag
        type: string
        required: false
        default: ""
        description: 强制删除不确认（--force）
        examples:
          - ""
          - " --force"

  - name: index_status
    description: 查看索引状态
    trigger_patterns:
      - "索引状态"
      - "索引.*怎么样"
      - "索引更新.*"
    template: "se index status"
    parameters: []

  - name: index_rebuild
    description: 重建文件索引
    trigger_patterns:
      - "重建索引"
      - "更新索引"
      - "刷新索引"
    template: "se index rebuild --path {path}"
    parameters:
      - name: path
        type: string
        required: false
        default: "."
        description: 重建索引的路径
        examples:
          - "."
          - "D:/"
          - "/home"

## 使用示例

### 搜索文件
```
用户：搜索工作目录的 PDF 文件
→ se search "*.pdf" --path D:/work --format json

用户：查找所有 Rust 源代码
→ se search "*.rs" --format json

用户：report 文件在哪里
→ se search "report*" --format json
```

### 查看文件
```
用户：查看这个文件的信息
→ se info D:/work/report.pdf

用户：README 里面是什么
→ se cat README.md --lines 50

用户：显示日志文件末尾 10 行
→ se cat app.log --tail --lines 10
```

### 文件操作
```
用户：把这些文件复制到备份目录
→ se copy "D:/work/*.txt" "D:/backup/"

用户：移动临时文件到归档
→ se move temp.zip /archive/

用户：删除所有临时文件
→ se delete "*.tmp" --force
```

## 输出格式

### JSON 输出（默认用于 OpenClaw）
```json
{
  "results": [
    {
      "path": "/home/user/document.pdf",
      "size": 1048576,
      "modified": "2026-03-10T14:30:00Z",
      "is_dir": false
    }
  ],
  "total": 1,
  "error": null
}
```

### 错误响应
```json
{
  "error": "文件未找到",
  "code": 404,
  "details": "路径 /not/exist 不存在"
}
```

## 注意事项

1. **路径格式**：Windows 使用 `D:/work` 或 `D:\work`，Linux 使用 `/home/user`
2. **通配符**：支持 `*`（任意字符）和 `?`（单个字符）
3. **JSON 输出**：OpenClaw 调用时自动使用 `--format json`
4. **权限**：某些操作可能需要管理员权限
5. **性能**：大量文件搜索建议使用索引功能
