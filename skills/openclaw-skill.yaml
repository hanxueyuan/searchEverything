# searchEverything OpenClaw Skill
# Cross-platform file search CLI tool - Designed for deep OpenClaw integration
# GitHub: https://github.com/hanxueyuan/searchEverything
# Documentation: https://github.com/hanxueyuan/searchEverything/blob/main/docs/OPENCLAW_INTEGRATION.md

name: searchEverything
version: 0.2.0
description: "Cross-platform file search tool with wildcard, regex, and fuzzy search support, plus file operations and index management"
author: 韩雪原 <xueyuan_han@163.com>
license: MIT
homepage: https://github.com/hanxueyuan/searchEverything

#===============================================================================
# Install Hook - Automatically download and install executable
#===============================================================================
on_install:
  script: scripts/openclaw-install.sh
  description: "Automatically download and install searchEverything executable"
  platforms: [linux, macos, windows]
  timeout_seconds: 300
  post_install_message: |
    ✅ searchEverything installation complete!
    
    Usage:
    - Search files: searchEverything search "*.pdf"
    - View info: searchEverything info <file-path>
    - Read content: searchEverything cat <file-path>
    - Index management: searchEverything index list
    
    OpenClaw Natural Language Triggers:
    - "Search for PDF files" → Automatically calls search command
    - "View information about this file" → Automatically calls info command
    - "Read configuration file" → Automatically calls cat command
    - "Add work directory to index" → Automatically calls index_add command
    
    Configuration file location: ~/.openclaw/skills/searchEverything/config.yaml
    Log file location: ~/.openclaw/skills/searchEverything/logs/
    
    If command not found, ensure ~/.local/bin is added to PATH

#===============================================================================
# Update Hook - Supports version check and update
#===============================================================================
on_update:
  script: scripts/openclaw-update.sh
  description: "Check and update to latest version"
  check_version: true
  auto_update: false  # Update after user confirmation
  min_version: "0.2.0"

#===============================================================================
# Uninstall Hook - Clean up installation files
#===============================================================================
on_uninstall:
  script: scripts/openclaw-uninstall.sh
  description: "Uninstall searchEverything"
  modes:
    - name: full
      description: "Complete uninstall, delete all data"
      default: true
    - name: keep_config
      description: "Keep configuration files and index"
    - name: disable_only
      description: "Only disable Skill, keep all data"

#===============================================================================
# Dependency Checks
#===============================================================================
dependencies:
  - name: "PATH includes ~/.local/bin"
    check: "command -v searchEverything"
    fix_message: |
      Please add ~/.local/bin to PATH:
      echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc
      source ~/.bashrc
  - name: "curl available"
    check: "command -v curl"
    fix_message: "Please install curl: sudo apt install curl (Linux) or brew install curl (macOS)"
  - name: "OpenClaw runtime"
    check: "command -v openclaw"
    optional: true
    fix_message: "OpenClaw not installed, some features may be unavailable"

#===============================================================================
# Version Management
#===============================================================================
version:
  source: "github:hanxueyuan/searchEverything"
  auto_update: true
  min_version: "0.2.0"
  release_api: "https://api.github.com/repos/hanxueyuan/searchEverything/releases/latest"
  binary_pattern: "searchEverything-{arch}-{os}{ext}"

#===============================================================================
# Command Definitions
#===============================================================================
commands:
  # ==================== Search Command ====================
  - name: search
    description: "Search for files"
    aliases: ["find", "lookup"]
    trigger_patterns:
      # English (primary)
      - "search for.*files"
      - "find.*files"
      - "where is.*"
      - "list.*files"
      - "show.*files"
      - "look for.*"
      # Chinese (secondary)
      - "搜索.*文件"
      - "查找.*"
      - "找.*文件"
      - "有哪些.*文件"
    arguments:
      - name: pattern
        type: string
        required: true
        description: "Search pattern (supports wildcards * and ?)"
        position: 0
      - name: path
        type: string
        required: false
        description: "Search path, defaults to current directory"
        flag: "--path"
      - name: limit
        type: number
        required: false
        default: 100
        description: "Result limit"
        flag: "--limit"
      - name: regex
        type: boolean
        required: false
        default: false
        description: "Use regular expression search"
        flag: "--regex"
      - name: fuzzy
        type: boolean
        required: false
        default: false
        description: "Use fuzzy search"
        flag: "--fuzzy"
      - name: case_sensitive
        type: boolean
        required: false
        default: false
        description: "Case sensitive search"
        flag: "--case-sensitive"
    execution:
      command: searchEverything
      args: ["search", "{{pattern}}", "{{#if path}}--path {{path}}{{/if}}", "{{#if limit}}--limit {{limit}}{{/if}}", "{{#if regex}}--regex{{/if}}", "{{#if fuzzy}}--fuzzy{{/if}}", "{{#if case_sensitive}}--case-sensitive{{/if}}"]
    output:
      format: json
      parse_results: true

  # ==================== File Info Command ====================
  - name: info
    description: "View detailed file information"
    aliases: ["fileinfo", "stat"]
    trigger_patterns:
      # English (primary)
      - "view.*info"
      - "file.*info"
      - "information.*file"
      - "show.*details"
      - "check.*file"
      # Chinese (secondary)
      - "查看.*信息"
      - "文件信息"
      - "这个文件.*信息"
    arguments:
      - name: path
        type: string
        required: true
        description: "File path"
        position: 0
    execution:
      command: searchEverything
      args: ["info", "{{path}}"]
    output:
      format: json
      pretty_print: true

  # ==================== Read File Command ====================
  - name: cat
    description: "Read file content"
    aliases: ["read", "view"]
    trigger_patterns:
      # English (primary)
      - "read.*content"
      - "view.*content"
      - "cat.*file"
      - "read.*file"
      - "open.*file"
      - "show.*content"
      # Chinese (secondary)
      - "读取.*内容"
      - "查看.*内容"
      - "打开.*文件"
    arguments:
      - name: path
        type: string
        required: true
        description: "File path"
        position: 0
      - name: lines
        type: number
        required: false
        description: "Number of lines to read"
        flag: "--lines"
    execution:
      command: searchEverything
      args: ["cat", "{{path}}", "{{#if lines}}--lines {{lines}}{{/if}}"]
    output:
      format: text
      max_lines: 1000

  # ==================== Copy File Command ====================
  - name: copy
    description: "Copy files"
    aliases: ["cp"]
    trigger_patterns:
      # English (primary)
      - "copy.*file"
      - "copy.*files"
      - "duplicate.*"
      # Chinese (secondary)
      - "复制.*文件"
      - "拷贝.*"
      - "把.*复制到"
    arguments:
      - name: source
        type: string
        required: true
        description: "Source file path"
        position: 0
      - name: destination
        type: string
        required: true
        description: "Destination path"
        position: 1
    execution:
      command: searchEverything
      args: ["copy", "{{source}}", "{{destination}}"]
    confirmation:
      required: true
      message: "Are you sure you want to copy the file(s)?"

  # ==================== Move File Command ====================
  - name: move
    description: "Move files"
    aliases: ["mv"]
    trigger_patterns:
      # English (primary)
      - "move.*file"
      - "move.*files"
      - "relocate.*"
      # Chinese (secondary)
      - "移动.*文件"
      - "把.*移动到"
    arguments:
      - name: source
        type: string
        required: true
        description: "Source file path"
        position: 0
      - name: destination
        type: string
        required: true
        description: "Destination path"
        position: 1
    execution:
      command: searchEverything
      args: ["move", "{{source}}", "{{destination}}"]
    confirmation:
      required: true
      message: "Are you sure you want to move the file(s)?"

  # ==================== Delete File Command ====================
  - name: delete
    description: "Delete files"
    aliases: ["rm", "remove"]
    trigger_patterns:
      # English (primary)
      - "delete.*file"
      - "delete.*files"
      - "remove.*"
      - "erase.*"
      # Chinese (secondary)
      - "删除.*文件"
      - "移除.*"
      - "删掉.*"
    arguments:
      - name: path
        type: string
        required: true
        description: "File path"
        position: 0
      - name: force
        type: boolean
        required: false
        default: false
        description: "Force delete without confirmation"
        flag: "--force"
    execution:
      command: searchEverything
      args: ["delete", "{{path}}", "{{#if force}}--force{{/if}}"]
    confirmation:
      required: true
      message: "Are you sure you want to delete this file? This action cannot be undone!"
      skip_if_force: true

  # ==================== Index Management Commands ====================
  - name: index_add
    description: "Add index path"
    aliases: ["index-add", "add-index"]
    trigger_patterns:
      # English (primary)
      - "add.*index"
      - "index.*add"
      - "add.*directory.*index"
      # Chinese (secondary)
      - "添加.*索引"
      - "把这个目录加入索引"
    arguments:
      - name: path
        type: string
        required: true
        description: "Path to index"
        flag: "--path"
    execution:
      command: searchEverything
      args: ["index", "add", "--path", "{{path}}"]

  - name: index_remove
    description: "Remove index path"
    aliases: ["index-remove", "remove-index"]
    trigger_patterns:
      # English (primary)
      - "remove.*index"
      - "index.*remove"
      - "delete.*from.*index"
      # Chinese (secondary)
      - "移除.*索引"
      - "从索引中删除"
    arguments:
      - name: path
        type: string
        required: true
        description: "Path to remove"
        flag: "--path"
    execution:
      command: searchEverything
      args: ["index", "remove", "--path", "{{path}}"]

  - name: index_list
    description: "List index paths"
    aliases: ["index-list", "list-index"]
    trigger_patterns:
      # English (primary)
      - "list.*index"
      - "index.*list"
      - "show.*index"
      - "view.*index"
      # Chinese (secondary)
      - "列出.*索引"
      - "索引列表"
      - "查看索引"
    execution:
      command: searchEverything
      args: ["index", "list"]

  - name: index_rebuild
    description: "Rebuild index"
    aliases: ["index-rebuild", "rebuild-index"]
    trigger_patterns:
      # English (primary)
      - "rebuild.*index"
      - "index.*rebuild"
      - "refresh.*index"
      # Chinese (secondary)
      - "重建.*索引"
      - "重新索引"
    execution:
      command: searchEverything
      args: ["index", "rebuild"]
    confirmation:
      required: true
      message: "Rebuilding index may take a while. Continue?"

  - name: index_status
    description: "View index status"
    aliases: ["index-status"]
    trigger_patterns:
      # English (primary)
      - "index.*status"
      - "index.*progress"
      - "check.*index"
      # Chinese (secondary)
      - "索引状态"
      - "索引进度"
    execution:
      command: searchEverything
      args: ["index", "status"]

  - name: index_exclude_add
    description: "Add exclusion path"
    aliases: ["index-exclude-add", "exclude-path"]
    trigger_patterns:
      # English (primary)
      - "exclude.*path"
      - "index.*exclude"
      - "ignore.*directory"
      # Chinese (secondary)
      - "排除.*路径"
      - "忽略.*目录"
    arguments:
      - name: path
        type: string
        required: true
        description: "Path to exclude"
        position: 0
    execution:
      command: searchEverything
      args: ["index", "exclude", "add", "{{path}}"]

  # ==================== Configuration Management Commands ====================
  - name: config_show
    description: "Show configuration"
    aliases: ["config-show", "show-config"]
    trigger_patterns:
      # English (primary)
      - "show.*config"
      - "view.*config"
      - "config.*show"
      - "current.*config"
      # Chinese (secondary)
      - "显示.*配置"
      - "查看.*配置"
      - "当前配置"
    execution:
      command: searchEverything
      args: ["config", "show"]

  - name: config_reset
    description: "Reset configuration"
    aliases: ["config-reset", "reset-config"]
    trigger_patterns:
      # English (primary)
      - "reset.*config"
      - "config.*reset"
      - "restore.*default"
      # Chinese (secondary)
      - "重置.*配置"
      - "恢复默认配置"
    execution:
      command: searchEverything
      args: ["config", "reset"]
    confirmation:
      required: true
      message: "Are you sure you want to reset configuration? Custom settings will be lost!"

  - name: config_validate
    description: "Validate configuration"
    aliases: ["config-validate", "validate-config"]
    trigger_patterns:
      # English (primary)
      - "validate.*config"
      - "config.*validate"
      - "check.*config"
      # Chinese (secondary)
      - "验证.*配置"
      - "检查配置"
    execution:
      command: searchEverything
      args: ["config", "validate"]

  # ==================== Update Command ====================
  - name: update
    description: "Check and update searchEverything"
    aliases: ["upgrade"]
    trigger_patterns:
      # English (primary)
      - "update.*search"
      - "upgrade.*version"
      - "check.*update"
      # Chinese (secondary)
      - "更新.*search"
      - "升级.*版本"
    execution:
      command: searchEverything
      args: ["update"]

  # ==================== Skill Test Command ====================
  - name: skill_test
    description: "Run Skill test"
    aliases: ["skill-test", "test-skill"]
    trigger_patterns:
      # English (primary)
      - "test.*skill"
      - "skill.*test"
      - "verify.*install"
      # Chinese (secondary)
      - "测试.*技能"
      - "验证安装"
    execution:
      command: searchEverything
      args: ["skill-test"]

  # ==================== Help Command ====================
  - name: help
    description: "Show help information"
    aliases: ["--help", "-h"]
    trigger_patterns:
      # English (primary)
      - "help"
      - "how.*use"
      - "usage"
      # Chinese (secondary)
      - "帮助"
      - "使用说明"
      - "怎么用"
    execution:
      command: searchEverything
      args: ["--help"]

#===============================================================================
# Environment Variable Configuration
#===============================================================================
env:
  SEARCH_EVERYTHING_CONFIG: "~/.openclaw/skills/searchEverything/config.yaml"
  SEARCH_EVERYTHING_INDEX: "~/.openclaw/skills/searchEverything/index-config.yaml"
  SEARCH_EVERYTHING_AUDIT_LOG: "~/.openclaw/skills/searchEverything/logs/audit.log"
  SEARCH_EVERYTHING_CACHE: "~/.openclaw/skills/searchEverything/cache/"
  OPENCLAW_SKILL_ENABLED: "true"

#===============================================================================
# Permission Requirements
#===============================================================================
permissions:
  - filesystem_read
  - filesystem_write
  - filesystem_delete
  - network_download  # For update checks

#===============================================================================
# OpenClaw Integration Configuration
#===============================================================================
openclaw:
  # Skill metadata
  metadata:
    category: "file_management"
    tags: ["search", "file", "index", "utility"]
    icon: "🔍"
    color: "#4A90D9"
  
  # Logging integration
  logging:
    enabled: true
    level: "info"  # debug, info, warn, error
    output: "~/.openclaw/skills/searchEverything/logs/"
    format: "json"
    max_size_mb: 10
    rotation: true
  
  # Audit logging
  audit:
    enabled: true
    log_file: "~/.openclaw/skills/searchEverything/logs/audit.log"
    log_commands: true
    log_errors: true
    retention_days: 30
  
  # Configuration management
  config:
    managed_by_openclaw: true
    sync_with_global: true
    backup_on_change: true
  
  # Update check
  update_check:
    enabled: true
    interval_days: 7
    notify_on_update: true
  
  # Performance configuration
  performance:
    max_concurrent_commands: 5
    timeout_seconds: 60
    memory_limit_mb: 512

#===============================================================================
# Error Handling Configuration
#===============================================================================
error_handling:
  # Installation failure handling
  on_install_failure:
    rollback: true
    show_manual_instructions: true
    log_error: true
  
  # Runtime failure handling
  on_command_failure:
    retry_count: 1
    show_suggestion: true
    log_error: true
  
  # Uninstall failure handling
  on_uninstall_failure:
    force_option: true
    show_cleanup_guide: true
    log_error: true

#===============================================================================
# Test Configuration
#===============================================================================
testing:
  enabled: true
  test_command: "searchEverything skill-test"
  test_cases:
    - name: "Basic Search"
      command: "searchEverything search \"*.md\""
      expected_exit_code: 0
    - name: "Index List"
      command: "searchEverything index list"
      expected_exit_code: 0
    - name: "Config Show"
      command: "searchEverything config show"
      expected_exit_code: 0
